        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: system-ui, sans-serif;
                background: #1e1e2e;
                color: #cdd6f4;
                display: flex;
                flex-direction: column;
                height: 100vh;
                overflow: hidden;
            }

            /* ── 顶部工具栏 ── */
            #toolbar {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 8px 16px;
                background: #181825;
                border-bottom: 1px solid #313244;
                flex-shrink: 0;
            }
            #toolbar h1 {
                font-size: 1rem;
                font-weight: 600;
                color: #cba6f7;
                margin-right: auto;
            }
            #toolbar button {
                background: #313244;
                color: #cdd6f4;
                border: 1px solid #45475a;
                border-radius: 6px;
                padding: 4px 12px;
                font-size: 0.85rem;
                cursor: pointer;
            }
            #toolbar button:hover {
                background: #45475a;
            }
            #ep-counter {
                font-size: 0.8rem;
                color: #6c7086;
            }

            /* ── 主体 ── */
            #main {
                display: flex;
                flex: 1;
                overflow: hidden;
            }

            /* ── 目录侧边栏 ── */
            #toc-panel {
                width: 280px;
                background: #181825;
                border-right: 1px solid #313244;
                display: flex;
                flex-direction: column;
                flex-shrink: 0;
                transition: width 0.2s;
                overflow: hidden;
            }
            #toc-panel.hidden {
                width: 0;
            }

            #toc-search {
                padding: 8px 12px;
                flex-shrink: 0;
                border-bottom: 1px solid #313244;
            }
            #toc-search input {
                width: 100%;
                background: #313244;
                color: #cdd6f4;
                border: 1px solid #45475a;
                border-radius: 6px;
                padding: 5px 10px;
                font-size: 0.82rem;
                outline: none;
            }
            #toc-search input::placeholder {
                color: #6c7086;
            }

            #toc-list {
                list-style: none;
                overflow-y: auto;
                flex: 1;
            }
            #toc-list li a {
                display: block;
                padding: 7px 14px;
                font-size: 0.8rem;
                color: #bac2de;
                text-decoration: none;
                border-left: 3px solid transparent;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            #toc-list li a:hover {
                background: #313244;
                color: #cdd6f4;
            }
            #toc-list li a.active {
                border-left-color: #cba6f7;
                color: #cba6f7;
                background: #1e1e2e;
            }

            /* ── iframe 阅读区 ── */
            #viewer-wrap {
                flex: 1;
                position: relative;
                overflow: hidden;
            }
            #viewer {
                width: 100%;
                height: 100%;
                border: none;
                background: #fff;
            }

            /* ── 翻页按钮 ── */
            .nav-btn {
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
                background: rgba(30, 30, 46, 0.65);
                color: #cdd6f4;
                border: none;
                font-size: 1.6rem;
                width: 36px;
                height: 72px;
                cursor: pointer;
                z-index: 10;
                border-radius: 4px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .nav-btn:hover {
                background: rgba(203, 166, 247, 0.35);
            }
            #btn-prev {
                left: 4px;
            }
            #btn-next {
                right: 4px;
            }
        </style>

            // 文件路径规则：episodes/englishpod_XXXX.html
            function epPath(id) {
                const num = id.slice(1); // "0001"
                return `episodes/englishpod_${num}.html`;
            }

            let current = 0;

            // 渲染目录
            const tocList = document.getElementById("toc-list");
            function renderToc(filter = "") {
                tocList.innerHTML = "";
                episodes.forEach((ep, i) => {
                    if (
                        filter &&
                        !ep.title.toLowerCase().includes(filter.toLowerCase())
                    )
                        return;
                    const li = document.createElement("li");
                    const a = document.createElement("a");
                    a.textContent = `${i + 1}. ${ep.title}`;
                    a.href = "#";
                    a.dataset.index = i;
                    if (i === current) a.classList.add("active");
                    a.addEventListener("click", (e) => {
                        e.preventDefault();
                        goTo(i);
                    });
                    li.appendChild(a);
                    tocList.appendChild(li);
                });
            }

            function goTo(index) {
                current = index;
                const ep = episodes[index];
                document.getElementById("viewer").src = epPath(ep.id);
                document.getElementById("ep-counter").textContent =
                    `${index + 1} / ${episodes.length}`;
                renderToc(document.getElementById("search-input").value);
                // 高亮滚动到可见
                const active = tocList.querySelector("a.active");
                if (active) active.scrollIntoView({ block: "nearest" });
            }

            function prev() {
                if (current > 0) goTo(current - 1);
            }
            function next() {
                if (current < episodes.length - 1) goTo(current + 1);
            }

            document.getElementById("btn-prev").onclick = prev;
            document.getElementById("btn-next").onclick = next;
            document.getElementById("btn-prev-top").onclick = prev;
            document.getElementById("btn-next-top").onclick = next;
            document.getElementById("btn-toc").onclick = () => {
                document.getElementById("toc-panel").classList.toggle("hidden");
            };
            document
                .getElementById("search-input")
                .addEventListener("input", (e) => {
                    renderToc(e.target.value);
                });

            // 键盘翻页
            document.addEventListener("keydown", (e) => {
                if (e.key === "ArrowLeft") prev();
                if (e.key === "ArrowRight") next();
            });

            // 初始化
            renderToc();
            goTo(0);
        </script>
